<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>普昌视频站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        :root {
            --bg: #f9f9f9;
            --card: #fff;
            --text: #222;
            --sub: #666;
            --main: #ff4444;
            --border: #eee;
            --bar: #fff;
        }

        .dark {
            --bg: #121212;
            --card: #1e1e1e;
            --text: #f0f0f0;
            --sub: #aaa;
            --main: #ff4444;
            --border: #333;
            --bar: #1e1e1e;
        }

        body {
            background: var(--bg);
            color: var(--text);
        }

        /* 登录弹窗 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .modal-box {
            background: var(--card);
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
        }

        .modal input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg);
            color: var(--text);
        }

        .modal button {
            width: 100%;
            padding: 10px;
            background: var(--main);
            color: white;
            border: none;
            border-radius: 6px;
            margin-top: 10px;
            cursor: pointer;
        }

        /* 导航 */
        header {
            background: var(--bar);
            position: sticky;
            top: 0;
            z-index: 999;
            border-bottom: 1px solid var(--border);
        }

        .nav {
            max-width: 1200px;
            margin: auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            color: var(--main);
            cursor: pointer;
        }

        .search {
            flex: 1;
            max-width: 500px;
            margin: 0 15px;
        }

        .search input {
            width: 100%;
            padding: 8px 14px;
            border: 1px solid var(--border);
            border-radius: 20px;
            background: var(--bg);
            color: var(--text);
            outline: none;
        }

        .nav-menu button {
            background: none;
            border: none;
            color: var(--text);
            margin-left: 12px;
            cursor: pointer;
            font-size: 14px;
        }

        /* 分类 */
        .category {
            max-width: 1200px;
            margin: 15px auto;
            padding: 0 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .category button {
            padding: 6px 12px;
            border: 1px solid var(--border);
            border-radius: 15px;
            background: var(--card);
            color: var(--text);
            cursor: pointer;
        }

        .category .active {
            background: var(--main);
            color: white;
            border-color: var(--main);
        }

        /* 容器 */
        .container {
            max-width: 1200px;
            margin: auto;
            padding: 0 20px;
        }

        /* 播放器 */
        .player-box {
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
        }

        video {
            width: 100%;
            border-radius: 8px;
        }

        .tool-bar {
            display: flex;
            gap: 15px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .tool-bar button {
            padding: 6px 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg);
            color: var(--text);
            cursor: pointer;
        }

        /* 视频网格 */
        .video-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(185px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .video-card {
            background: var(--card);
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
        }

        .video-card img {
            width: 100%;
            height: 105px;
            object-fit: cover;
        }

        .video-info {
            padding: 8px;
        }

        .video-title {
            font-size: 14px;
            line-height: 1.4;
            height: 40px;
            overflow: hidden;
        }

        /* 评论 */
        .comment-box {
            background: var(--card);
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .comment-input {
            width: 100%;
            padding: 8px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg);
            color: var(--text);
            margin-bottom: 10px;
        }

        .comment-item {
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
        }

        /* 页面 */
        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: var(--card);
            border-top: 1px solid var(--border);
            margin-top: 40px;
        }
    </style>
</head>

<body>

<!-- 登录弹窗 -->
<div id="loginModal" class="modal">
    <div class="modal-box">
        <h3>登录 / 注册</h3>
        <input id="loginUser" placeholder="用户名">
        <input id="loginPwd" type="password" placeholder="密码">
        <button onclick="login()">登录</button>
        <button onclick="register()" style="background:#666;">注册</button>
    </div>
</div>

<!-- 导航 -->
<header>
    <div class="nav">
        <div class="logo" onclick="goPage('home')">🎬 普昌视频站</div>
        <div class="search">
            <input id="searchInput" placeholder="搜索视频" oninput="doSearch()">
        </div>
        <div class="nav-menu">
            <button onclick="goPage('home')">首页</button>
            <button onclick="goPage('user')">个人中心</button>
            <button onclick="toggleDark()">暗黑模式</button>
            <button onclick="logout()" style="color:var(--main)">退出登录</button>
        </div>
    </div>
</header>

<!-- 分类 -->
<div class="category">
    <button class="active" onclick="filterCategory('全部')">全部</button>
    <button onclick="filterCategory('电影')">电影</button>
    <button onclick="filterCategory('番剧')">番剧</button>
    <button onclick="filterCategory('游戏')">游戏</button>
    <button onclick="filterCategory('生活')">生活</button>
</div>

<div class="container">
    <!-- 首页 -->
    <div id="pageHome" class="page active">
        <div class="player-box">
            <video id="mainVideo" controls poster="https://picsum.photos/800/450"></video>
            <h3 id="currentTitle" style="margin:12px 0;">请选择视频播放</h3>
            
            <div class="tool-bar">
                <button onclick="likeVideo()">👍 点赞</button>
                <button onclick="favoriteVideo()">⭐ 收藏</button>
            </div>

            <div class="comment-box">
                <h4>评论区</h4>
                <input class="comment-input" id="commentInput" placeholder="发表评论">
                <button onclick="sendComment()">发布评论</button>
                <div id="commentList"></div>
            </div>
        </div>

        <h3>🎞 推荐视频</h3>
        <div class="video-list" id="videoList"></div>
    </div>

    <!-- 个人中心 -->
    <div id="pageUser" class="page">
        <h2>我的收藏</h2>
        <div class="video-list" id="myFavList"></div>
    </div>
</div>

<footer>普昌视频站 © 2025 免费在线视频网站</footer>

<script>
// ======================================
// 固定视频列表（不会崩溃、不会报错）
// ======================================
const videos = [
{ id:1, title:"4K风景大片", type:"电影", cover:"https://picsum.photos/400/225?1", url:"https://www.w3school.com.cn/i/movie.mp4" },
{ id:2, title:"动漫新番推荐", type:"番剧", cover:"https://picsum.photos/400/225?2", url:"https://www.w3school.com.cn/i/movie.mp4" },
{ id:3, title:"游戏攻略解说", type:"游戏", cover:"https://picsum.photos/400/225?3", url:"https://www.w3school.com.cn/i/movie.mp4" },
{ id:4, title:"美食制作教程", type:"生活", cover:"https://picsum.photos/400/225?4", url:"https://www.w3school.com.cn/i/movie.mp4" },
{ id:5, title:"旅行Vlog", type:"生活", cover:"https://picsum.photos/400/225?5", url:"https://www.w3school.com.cn/i/movie.mp4" },
{ id:6, title:"科幻短片", type:"电影", cover:"https://picsum.photos/400/225?6", url:"https://www.w3school.com.cn/i/movie.mp4" },
{ id:7, title:"城市延时摄影", type:"生活", cover:"https://picsum.photos/400/225?7", url:"https://www.w3school.com.cn/i/movie.mp4" },
{ id:8, title:"音乐MV精选", type:"电影", cover:"https://picsum.photos/400/225?8", url:"https://www.w3school.com.cn/i/movie.mp4" },
{ id:9, title:"宠物可爱瞬间", type:"生活", cover:"https://picsum.photos/400/225?9", url:"https://www.w3school.com.cn/i/movie.mp4" },
{ id:10, title:"科技产品展示", type:"游戏", cover:"https://picsum.photos/400/225?10", url:"https://www.w3school.com.cn/i/movie.mp4" },
{ id:11, title:"健身教程", type:"生活", cover:"https://picsum.photos/400/225?11", url:"https://www.w3school.com.cn/i/movie.mp4" },
{ id:12, title:"汽车评测", type:"电影", cover:"https://picsum.photos/400/225?12", url:"https://www.w3school.com.cn/i/movie.mp4" },
{ id:13, title:"大自然纪录片", type:"电影", cover:"https://picsum.photos/400/225?13", url:"https://www.w3school.com.cn/i/movie.mp4" },
{ id:14, title:"搞笑短视频", type:"生活", cover:"https://picsum.photos/400/225?14", url:"https://www.w3school.com.cn/i/movie.mp4" },
{ id:15, title:"编程入门教程", type:"游戏", cover:"https://picsum.photos/400/225?15", url:"https://www.w3school.com.cn/i/movie.mp4" }
];

let user = JSON.parse(localStorage.getItem("currentUser")) || null;
let users = JSON.parse(localStorage.getItem("users")) || [];
let currentVideo = null;

// ======================================
// 登录注册
// ======================================
function login() {
    let u = document.getElementById("loginUser").value;
    let p = document.getElementById("loginPwd").value;
    let find = users.find(x=>x.user===u&&x.pwd===p);
    if(!find){alert("账号或密码错误");return;}
    user = find;
    localStorage.setItem("currentUser",JSON.stringify(user));
    document.getElementById("loginModal").style.display="none";
}

function register(){
    let u = document.getElementById("loginUser").value;
    let p = document.getElementById("loginPwd").value;
    if(users.find(x=>x.user===u)){alert("用户名已存在");return;}
    users.push({user:u,pwd:p});
    localStorage.setItem("users",JSON.stringify(users));
    alert("注册成功！请登录");
}

function logout(){
    user=null;localStorage.removeItem("currentUser");location.reload();
}

// ======================================
// 页面切换
// ======================================
function goPage(p){
    document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
    document.getElementById("page"+p.charAt(0).toUpperCase()+p.slice(1)).classList.add("active");
    if(p==="user") renderUserPage();
}

// ======================================
// 渲染视频
// ======================================
function render(list=videos){
    let box = document.getElementById("videoList");
    box.innerHTML = "";
    list.forEach(v=>{
        let card = document.createElement("div");
        card.className = "video-card";
        card.innerHTML = `<img src="${v.cover}"><div class="video-info"><div class="video-title">${v.title}</div></div>`;
        card.onclick = ()=>play(v);
        box.appendChild(card);
    });
}

function play(v){
    currentVideo = v;
    document.getElementById("mainVideo").src = v.url;
    document.getElementById("currentTitle").innerText = v.title;
    renderComment();
}

// ======================================
// 点赞、收藏、评论
// ======================================
function likeVideo(){ if(!currentVideo) return; alert("点赞成功！"); }
function favoriteVideo(){ if(!currentVideo) return; alert("收藏成功！"); }

function sendComment(){
    if(!currentVideo||!user)return;
    let txt = document.getElementById("commentInput").value.trim();
    if(!txt)return;
    let arr = JSON.parse(localStorage.getItem("comment_"+currentVideo.id))||[];
    arr.push({user:user.user,content:txt});
    localStorage.setItem("comment_"+currentVideo.id,JSON.stringify(arr));
    document.getElementById("commentInput").value="";
    renderComment();
}

function renderComment(){
    let arr = JSON.parse(localStorage.getItem("comment_"+currentVideo.id))||[];
    document.getElementById("commentList").innerHTML = arr.map(i=>`<div class="comment-item"><b>${i.user}</b>：${i.content}</div>`).join("");
}

// ======================================
// 分类、搜索
// ======================================
function filterCategory(t){
    document.querySelectorAll(".category button").forEach(b=>b.classList.remove("active"));
    event.target.classList.add("active");
    render(t==="全部"?videos:videos.filter(x=>x.type===t));
}

function doSearch(){
    let kw = document.getElementById("searchInput").value.toLowerCase();
    render(videos.filter(v=>v.title.toLowerCase().includes(kw)));
}

// ======================================
// 个人中心
// ======================================
function renderUserPage(){
    let box = document.getElementById("myFavList");
    box.innerHTML = "";
    videos.slice(0,5).forEach(v=>{
        let card = document.createElement("div");
        card.className="video-card";
        card.innerHTML=`<img src="${v.cover}"><div class="video-info"><div class="video-title">${v.title}</div></div>`;
        box.appendChild(card);
    });
}

// ======================================
// 暗黑模式
// ======================================
function toggleDark(){
    document.body.classList.toggle("dark");
}

// ======================================
// 启动
// ======================================
window.onload=()=>{
    render();
    if(user) document.getElementById("loginModal").style.display="none";
}
</script>

</body>
</html>
